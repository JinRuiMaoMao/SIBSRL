services:
  - type: web
    name: sibs-daily-challenge-bot
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    disk:
      name: daily-challenge-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DAILY_CHALLENGE_STORE_PATH
        value: /var/data/daily-challenge-live.json
      - key: DAILY_CHALLENGE_CORS_ORIGIN
        value: "*"
      - key: DAILY_CHALLENGE_HISTORY_LIMIT
        value: "90"
      - key: DISCORD_TOKEN
        sync: false
      - key: DAILY_CHALLENGE_CHANNEL_ID
        sync: false
      - key: ENA_BOT_USER_ID
        sync: false

  # 用户登录 / 收藏同步 API（免费档可 $0；数据在容器内，重新部署会清空，要持久化可改 starter + disk）
  - type: web
    name: sibs-user-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.user-api
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: USER_DB_PATH
        value: data/users.db
      - key: USER_API_CORS_ORIGIN
        value: https://jinruimaomao.github.io
      - key: MAIL_FROM
        value: SIBS Route Lookup <onboarding@resend.dev>
      - key: RESEND_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
