# GitHub Pages: build with /SIBSRL/ base and deploy via GitHub Actions.
# If "pages build and deployment" also fails on push, set repo Pages source to GitHub Actions only.
name: Deploy static site to Pages

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:only
        env:
          VITE_BASE: /SIBSRL/

      - name: Prepare Pages artifact
        run: node scripts/prepare-gh-pages-artifact.mjs _site

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry2.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Wait for competing Pages deploy
        run: sleep 60

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (retry 1)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before final retry
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (retry 2)
        id: deployment_retry2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Fail if all deploy attempts failed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure' && steps.deployment_retry2.outcome == 'failure'
        run: exit 1
