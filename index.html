    <script id="devtools-block">
(function () {
  var INDEX = './index.html';
  var href = String(window.location.href || '');
  var protocol = String(window.location.protocol || '');
  if (/^view-source:/i.test(href) || protocol === 'view-source:') {
    window.location.replace(INDEX);
    return;
  }
  function isBlocked(event) {
    var key = event.key || '';
    if (key === 'F12') return true;
    var upper = key.toUpperCase();
    if ((event.ctrlKey || event.metaKey) && event.shiftKey && 'IJC'.indexOf(upper) >= 0) return true;
    if (upper === 'U') {
      if (event.ctrlKey && !event.shiftKey && !event.altKey) return true;
      if (event.metaKey && event.altKey) return true;
    }
    if (upper === 'S' && (event.ctrlKey || event.metaKey)) return true;
    return false;
  }
  function block(event) {
    if (!isBlocked(event)) return;
    event.preventDefault();
    event.stopPropagation();
    if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
    return false;
  }
  ['keydown', 'keyup', 'keypress'].forEach(function (type) {
    window.addEventListener(type, block, true);
    document.addEventListener(type, block, true);
  });
  document.addEventListener(
    'click',
    function (event) {
      var target = event.target;
      if (!target || !target.closest) return;
      var link = target.closest('a[href]');
      if (!link) return;
      var linkHref = String(link.getAttribute('href') || '');
      if (/^view-source:/i.test(linkHref)) {
        event.preventDefault();
        event.stopPropagation();
        window.location.replace(INDEX);
      }
    },
    true,
  );
})();
</script>

      <script id="start-boot-splash-script">
(function () {
  var splash = document.getElementById('start-boot-splash');
  if (!splash) return;
  var BOOT_SEEN_KEY = 'sibs-start-boot-seen';
  function isBootSeen() {
    try { return localStorage.getItem(BOOT_SEEN_KEY) === '1'; } catch (e) { return false; }
  }
  if (isBootSeen()) {
    splash.remove();
    window.__SIBS_START_BOOT__ = {
      setProgress: function () {},
      finish: function () {},
    };
    return;
  }
  document.documentElement.classList.add('start-boot-active');
  var pctEl = document.getElementById('start-boot-percent');
  var labelEl = document.getElementById('start-boot-label');
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function setProgress(p, label) {
    var value = clamp(Math.round(p), 0, 100);
    if (label && labelEl) labelEl.textContent = label;
    if (pctEl) pctEl.textContent = value + '%';
    splash.setAttribute('aria-valuenow', String(value));
    if (label) splash.setAttribute('aria-valuetext', label + ' ' + value + '%');
  }
  window.__SIBS_START_BOOT__ = {
    setProgress: setProgress,
    finish: function () {
      document.documentElement.classList.remove('start-boot-active');
      splash.classList.add('is-done');
      splash.setAttribute('aria-busy', 'false');
      window.setTimeout(function () {
        if (splash.parentNode) splash.parentNode.removeChild(splash);
      }, 420);
    },
  };
  setProgress(0, '本站加载中…');
})();
</script>
