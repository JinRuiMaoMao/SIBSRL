    return false;
  }

    if (!isBlocked(event)) return;
    event.preventDefault();
    event.stopPropagation();
    if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();

  }
  ['keydown', 'keyup', 'keypress'].forEach(function (type) {
