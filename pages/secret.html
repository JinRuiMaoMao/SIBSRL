<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <script id="theme-bootstrap">
      (function () {
        try {
          var theme = localStorage.getItem('sibs-theme');
          if (theme !== 'light' && theme !== 'dark') theme = 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <meta name="app-page" content="secret" />
    <meta name="app-build" content="development" />

    <meta
      name="description"
      content="Sunshine Islands Bus Simulator (SIBS) 秘密线路：特殊安排与已停办线路"
    />
    <title>??? · 阳光群岛线路查询</title>
    <script id="secret-access-guard">
      (function () {
        try {

          }
        } catch (e) {
          location.replace('./index.html')
        }
      })()
    </script>
