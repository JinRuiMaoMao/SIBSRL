<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script id="start-route-redirect">
      (function () {
        var q = window.location.search || '';
        if (!q) return;
        var params = new URLSearchParams(q);
        if (params.has('route') || params.has('from') || params.has('to') || params.has('q')) {
          window.location.replace('./dev.html' + q + (window.location.hash || ''));
        }
      })();
    </script>
    <script id="theme-bootstrap">
      (function () {
        function resolveSystemAppearance() {
          try {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } catch (e) {
            return 'dark';
          }
        }

        try {
          var pref = localStorage.getItem('sibs-theme');
          if (pref !== 'light' && pref !== 'dark' && pref !== 'system') pref = 'system';
          document.documentElement.setAttribute(
            'data-theme',
            pref === 'system' ? resolveSystemAppearance() : pref,
          );
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <script id="locale-bootstrap">
      (function () {
        var key = 'sibs-locale';
        var langs = { vi:'vi', 'zh-Hans':'zh-Hans', 'zh-Hant':'zh-Hant', da:'da', en:'en', fil:'fil', id:'id', ko:'ko', 'pt-BR':'pt-BR', de:'de', es:'es', fr:'fr', ja:'ja', pl:'pl', sv:'sv' };
        try {
          var stored = localStorage.getItem(key);
          if (stored && Object.prototype.hasOwnProperty.call(langs, stored)) {
            document.documentElement.lang = langs[stored];
          }
        } catch (e) {}
      })();
    </script>
    <meta name="app-page" content="start" />
    <meta name="app-build" content="development" />
    <link rel="icon" href="./sibs-logo.png" type="image/png" sizes="53x53" />
    <link rel="apple-touch-icon" href="./sibs-logo.png" sizes="180x180" />
    <link rel="apple-touch-icon-precomposed" href="./sibs-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta
      name="description"
      content="Sunshine Islands Bus Simulator (SIBS) 巴士线路查询工具 - 阳光群岛 Roblox 巴士模拟器"
    />
    <title>阳光群岛巴士线路查询</title>
    <style id="start-boot-critical">
html.start-boot-active #root {
  visibility: hidden;
}
.start-boot-splash {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  background: var(--page-background, linear-gradient(160deg, #070b14 0%, #101829 100%));
  transition: opacity 0.38s ease, visibility 0.38s ease;
}
.start-boot-splash.is-done {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.start-boot-splash__inner {
  width: min(100%, 22rem);
}
.start-boot-splash__row {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  width: 100%;
}
.start-boot-splash__logo {
  width: 2.75rem;
  height: 2.75rem;
  flex-shrink: 0;
  object-fit: contain;
}
.start-boot-splash__progress-wrap {
  position: relative;
  flex: 1 1 auto;
  min-width: 0;
  padding-top: 1.35rem;
  padding-bottom: 1.35rem;
}
.start-boot-splash__percent {
  position: absolute;
  top: 0;
  right: 0;
  font-size: 0.72rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--accent, #f5b942);
  letter-spacing: 0.02em;
}
.start-boot-splash__track {
  height: 0.42rem;
  border-radius: 999px;
  background: color-mix(in srgb, var(--text-muted, #94a3b8) 22%, transparent);
  overflow: hidden;
  box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--border, rgba(245, 185, 66, 0.18)) 65%, transparent);
}
.start-boot-splash__fill {
  height: 100%;
  width: 0%;
  border-radius: inherit;
  background: linear-gradient(
    90deg,
    color-mix(in srgb, var(--accent, #f5b942) 82%, #fff 18%),
    var(--accent, #f5b942)
  );
  transition: width 0.72s ease;
}
.start-boot-splash__label {
  position: absolute;
  right: 0;
  bottom: 0;
  max-width: 100%;
  font-size: 0.68rem;
  color: var(--text-muted, #94a3b8);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: right;
}
    </style>
  </head>
  <body>
    <div id="start-boot-splash" class="start-boot-splash" aria-live="polite" aria-busy="true">
      <div class="start-boot-splash__inner">
        <div class="start-boot-splash__row">
          <img class="start-boot-splash__logo" src="./sibs-logo.png" alt="" width="44" height="44" decoding="async" />
          <div class="start-boot-splash__progress-wrap">
            <span class="start-boot-splash__percent" id="start-boot-percent">0%</span>
            <div class="start-boot-splash__track" id="start-boot-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Loading">
              <div class="start-boot-splash__fill" id="start-boot-fill"></div>
            </div>
            <span class="start-boot-splash__label" id="start-boot-label">加载中…</span>
          </div>
        </div>
      </div>
    </div>
    <noscript>
      <style>
        #root, .boot-hint { display: none !important; }
        #start-boot-splash { display: none !important; }
        .noscript-wall {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          margin: 0;
          padding: 2rem;
          box-sizing: border-box;
          font-family: system-ui, sans-serif;
          background: #0f1419;
          color: #e7e9ea;
          text-align: center;
          line-height: 1.6;
        }
        .noscript-wall h1 { font-size: 1.25rem; margin: 0 0 0.75rem; font-weight: 700; }
        .noscript-wall p { margin: 0.35rem 0; color: #8b98a5; max-width: 26rem; }
      </style>
      <div class="noscript-wall" id="noscript-wall" role="alert">
        <p aria-hidden="true">🚌</p>
        <h1>请启用 JavaScript</h1>
        <p>阳光群岛线路查询工具需要 JavaScript 才能运行，请在浏览器设置中开启后刷新页面。</p>
        <p lang="en">This site requires JavaScript. Please enable it in your browser settings and reload.</p>
      </div>
    </noscript>
    <div id="root"><p class="boot-hint">加载中…</p></div>
    <script id="start-boot-splash-script">
(function () {
  var splash = document.getElementById('start-boot-splash');
  if (!splash) return;
  document.documentElement.classList.add('start-boot-active');
  var pctEl = document.getElementById('start-boot-percent');
  var fillEl = document.getElementById('start-boot-fill');
  var labelEl = document.getElementById('start-boot-label');
  var track = document.getElementById('start-boot-track');
  function setProgress(p, label) {
    var value = Math.max(0, Math.min(100, Math.round(p)));
    if (pctEl) pctEl.textContent = value + '%';
    if (fillEl) fillEl.style.width = value + '%';
    if (label && labelEl) labelEl.textContent = label;
    if (track) track.setAttribute('aria-valuenow', String(value));
  }
  setProgress(4, '初始化…');
  window.setTimeout(function () { setProgress(10, '初始化…'); }, 420);
  window.__SIBS_START_BOOT__ = {
    setProgress: setProgress,
    finish: function () {
      document.documentElement.classList.remove('start-boot-active');
      splash.classList.add('is-done');
      splash.setAttribute('aria-busy', 'false');
      window.setTimeout(function () {
        if (splash.parentNode) splash.parentNode.removeChild(splash);
      }, 420);
    },
  };
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      window.setTimeout(function () { setProgress(18, '加载样式…'); }, 360);
    }, { once: true });
  } else {
    window.setTimeout(function () { setProgress(18, '加载样式…'); }, 360);
  }
})();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
